on:
  push:
    branches: [main]
    paths:
      - docs/**
      - book.json
      - package.json
      - index.html
      - config/totem.keymap
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate keymap SVG
        run: |
          pip install keymap-drawer
          mkdir -p docs/images
          keymap parse -z config/totem.keymap -o /tmp/keymap.yaml
          keymap draw /tmp/keymap.yaml -o docs/images/keymap.svg

      - run: npx --yes honkit build ./docs ./temp

      - run: mv docs/temp site

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
