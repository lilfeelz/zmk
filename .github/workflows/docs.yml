on:
  push:
    branches: [main]
    paths:
      - docs/**
      - book.json
      - index.html
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npx --yes honkit build ./docs ./site/docs && ls -la && file ./site && ls -laR ./site || echo "site not a dir"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          cname: docs.lilfeelz.org
