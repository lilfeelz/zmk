on:
  push:
    branches: [main]
    paths:
      - docs/**
      - book.json
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npx --yes honkit build ./docs ./temp

      - run: mv docs/temp site

      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.GH_DEPLOY_KEY }}
          external_repository: lilfeelz/lilfeelz.github.io
          publish_branch: main
          publish_dir: ./site
          destination_dir: zmk
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
