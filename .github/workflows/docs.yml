on:
  push:
    branches: [main]
    paths:
      - docs/**
      - book.json
      - index.html
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          ls -la
          echo "---"
          npx --yes honkit build ./docs ./_build
          echo "---"
          ls -la
          echo "---"
          ls -la _build/ 2>/dev/null || echo "_build not found"
          ls -la docs/_build/ 2>/dev/null || echo "docs/_build not found"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          cname: docs.lilfeelz.org
