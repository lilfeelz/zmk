name: Release
on:
  workflow_run:
    workflows: [build]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: JakobMelchard/.github/.github/workflows/release.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
