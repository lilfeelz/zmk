name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    uses: JakobMelchard/.github/.github/workflows/release.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
