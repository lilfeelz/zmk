on:
  push:
    branches: [main]
    paths:
      - config/**
      - boards/**
      - build.yaml
      - zephyr/**
      - .github/workflows/build.yml
  pull_request:
    branches: [main]
    paths:
      - config/**
      - boards/**
      - build.yaml
      - zephyr/**
      - .github/workflows/build.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
