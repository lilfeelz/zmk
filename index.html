<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TOTEM — lilfeelz ZMK config</title>
  <link rel="stylesheet" href="https://lilfeelz.org/assets/style.css">
  <style>
    :root {
      --bg: #0b0d10;
      --fg: #eef2f7;
      --muted: #9aa4b2;
      --line: rgba(255,255,255,.16);
      --glass: rgba(255,255,255,.075);
      --accent: #9ee7ff;
      --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="terminal glass">
    <header class="term-head">
      <span></span><span></span><span></span>
      <strong>lilfeelz/zmk</strong>
    </header>

    <p class="cmd">$ cat README.md</p>
    <article>
      <h1>TOTEM ZMK Configuration</h1>
      <p>36-key split column-staggered keyboard firmware for the <a href="https://github.com/GEIGEIGEIST/TOTEM">TOTEM</a>, powered by Seeed XIAO BLE.</p>

      <h2>Builds</h2>
      <table>
        <thead>
          <tr><th>shield</th><th>board</th></tr>
        </thead>
        <tbody>
          <tr><td><code>totem_left</code></td><td><code>xiao_ble//zmk</code></td></tr>
          <tr><td><code>totem_right</code></td><td><code>xiao_ble//zmk</code></td></tr>
          <tr><td><code>settings_reset</code></td><td><code>xiao_ble//zmk</code></td></tr>
        </tbody>
      </table>

      <footer>
        <nav>
          <a href="https://lilfeelz.org">lilfeelz.org</a>
          <a href="https://docs.lilfeelz.org">docs</a>
          <a href="https://github.com/lilfeelz/zmk">source</a>
        </nav>
      </footer>
    </article>
  </section>
</main>
</body>
</html>
